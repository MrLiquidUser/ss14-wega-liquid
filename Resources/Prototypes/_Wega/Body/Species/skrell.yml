- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceSkrell
  name: skrell appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganSkrellTorso
      Head: OrganSkrellHead
      ArmLeft: OrganSkrellArmLeft
      ArmRight: OrganSkrellArmRight
      HandLeft: OrganSkrellHandLeft
      HandRight: OrganSkrellHandRight
      LegLeft: OrganSkrellLegLeft
      LegRight: OrganSkrellLegRight
      FootLeft: OrganSkrellFootLeft
      FootRight: OrganSkrellFootRight
      Brain: OrganSkrellBrain
      Eyes: OrganSkrellEyes
      Tongue: OrganSkrellTongue
      Appendix: OrganSkrellAppendix
      Ears: OrganSkrellEars
      Lungs: OrganSkrellLungs
      Heart: OrganSkrellHeart
      Stomach: OrganSkrellStomach
      Liver: OrganSkrellLiver
      Kidneys: OrganSkrellKidneys
  - type: HumanoidProfile
    species: Skrell

- type: entity
  parent:
  - AppearanceSkrell
  - BaseSpeciesMobOrganic
  - BaseOperated
  id: MobSkrell
  name: Urist McSkrell
  components:
  - type: Skrell
  - type: Thirst
    baseDecayRate: 0.15
  - type: SolutionScanner
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Skrell
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: -1
            Blunt: -1
            Poison: -0.75
    - reagents: [ Holywater ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: -0.25
            Blunt: -0.25
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatSkrell
      amount: 5
  - type: DnaModifier
    upper: MobSkrell
    lowest: MobSkrellkey

- type: entity
  id: BaseSkrellOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Skrell/organ.rsi
  - type: Organ
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people
  - type: Tag
    tags:
      - Meat

- type: entity
  id: OrganSkrellBrain
  parent: [BaseSkrellOrgan, OrganHumanBrain]
  name: brain
  description: "The source of incredible, unending intelligence. Honk."
  components:
  - type: Item
    size: Small
    heldPrefix: brain
  - type: Sprite
    state: brain
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5
  - type: Tag
    tags:
      - BaseOrgan
      - Brain
      - Meat

- type: entity
  id: OrganSkrellEyes
  parent: BaseSkrellOrgan
  name: eyes
  description: "I see you!"
  components:
  - type: Sprite
    state: eyes
  - type: Item
    size: Small
    heldPrefix: eyes
  - type: Tag
    tags:
      - BaseOrgan
      - Eyes
      - Meat

- type: entity
  id: OrganSkrellLungs
  parent: BaseSkrellOrgan
  name: lungs
  description: "Filters oxygen from an atmosphere, which is then sent into the bloodstream to be used as an electron carrier."
  components:
  - type: Sprite
    state: lungs
  - type: Item
    size: Small
    heldPrefix: lungs
  - type: Lung
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Human ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100.0
        canReact: false
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Tag
    tags:
      - BaseOrgan
      - Lungs
      - Meat

- type: entity
  id: OrganSkrellHeart
  parent: BaseSkrellOrgan
  name: heart
  description: "I feel bad for the heartless bastard who lost this."
  components:
  - type: Sprite
    state: heart-on
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Human]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: Item
    size: Small
    heldPrefix: heart
  - type: Tag
    tags:
      - BaseOrgan
      - Heart
      - Meat

- type: entity
  id: OrganSkrellStomach
  parent: BaseSkrellOrgan
  name: stomach
  description: "Gross. This is hard to stomach."
  components:
  - type: Sprite
    state: intestine
  - type: Item
    size: Small
    heldPrefix: intestine
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
    updateInterval: 0.25
  - type: Metabolizer
    maxReagents: 3
    metabolizerTypes: [Human]
    groups:
    - id: Food
    - id: Drink
  - type: Tag
    tags:
      - BaseOrgan
      - Stomach
      - Meat

- type: entity
  id: OrganSkrellLiver
  parent: BaseSkrellOrgan
