- type: entity
  id: BorgChassisSecurity
  parent: BorgChassisSelectable
  name: security cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: security
  - type: SurgicalSkill # Corvax-Wega-Surgery

- type: entity
  id: BorgChassisScience
  parent: BorgChassisSelectable
  name: science cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: science
  - type: SurgicalSkill # Corvax-Wega-Surgery

- type: entity
  id: BorgChassisSecurityPlayer
  parent: BorgChassisSecurity
  name: security cyborg
  suffix: Sec
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMicroreactor
  - type: ContainerFill
    containers:
      borg_module:
      - BorgModuleGranader
      - BorgModuleLethal
      - BorgModuleSecRare
      - BorgModuleSheild

