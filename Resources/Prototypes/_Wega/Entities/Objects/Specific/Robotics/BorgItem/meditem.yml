## Doctor rare
- type: entity
  parent: BorgHypo
  suffix: tricordrazine
  id: BorgHypoTricordrazine
  components:
  - type: Sprite
    sprite: /Textures/_Wega/Objects/Specific/Medical/hyno.rsi
    layers:
    - state: borghypo
    - state: borghypo_trico
  - type: Item
    sprite: /Textures/_Wega/Objects/Specific/Medical/hyno.rsi
  - type: Label
    currentLabel: reagent-name-tricordrazine
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
        reagents:
        - ReagentId: Tricordrazine
          Quantity: 0
  - type: SolutionRegeneration
    solution: hypospray
    generated:
      reagents:
      - ReagentId: Tricordrazine
        Quantity: 0.5
  - type: Unremoveable
  - type: ItemSelector
    items:
    - BorgHypoTricordrazine
    - BorgHypoBicaridine
    - BorgHypoDermaline
    - BorgHypoDylovene
    - BorgHypoHyronalin
    - BorgHypoDexalin
    - BorgHypoEpinephrine
  - type: ActivatableUI
    key: enum.ItemSelectorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ItemSelectorUiKey.Key:
        type: ItemSelectorBoundUserInterface
  - type: Tag
    tags:
    - Itemborg

