- type: surgeryTransition
  id: IpcExtractBrainTransition
  target: IpcHeadOpen
  label: "Манипуляция с деталями"
  stepGroups:
    - conditions:
        - !type:ClothingCondition
          invert: true
          slots:
          - head
        - !type:OrganPresentCondition
          organ: Head
      parallel: true
      steps:
        # Камеры
        - tool: [ Screwing ]
          action: RemoveOrgan
          entityPreview: OrganIpcEyes
          requiredPart: Eyes
          sound:
            collection: Screwdriver
          time: 8
          conditions:
            - !type:OrganPresentCondition
              organ: Eyes
        - tag: [ EyesSynthetic ]
          action: InsertOrgan
          entityPreview: OrganIpcEyes
          requiredPart: Eyes
          sound:
            path: /Audio/Items/ratchet.ogg
          time: 8
          conditions:
            - !type:OrganPresentCondition
              invert: true
              organ: Eyes

- type: surgeryTransition
  id: IpcCompleteHeadAttachmentTransition
  target: IpcEndOperation
  label: Голова
  stepGroups:
    - conditions:
        - !type:OrganPresentCondition
          invert: true
          organ: Head
      steps:
        - tool: [ Screwing ]
          tag: [ Knife, Shiv, BasicGlassShard]
          action: Unscrew
          sound:
            collection: Screwdriver
          time: 2
        - tag: [ CableCoil ]
          entityPreview: CableApcStack
          action: MendWire
          time: 2
        - tag: [ Head ]
          action: InsertOrgan
          requiredPart: Head
          time: 8
          sound:
            path: /Audio/Items/ratchet.ogg

