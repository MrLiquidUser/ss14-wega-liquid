            path: /Audio/Items/ratchet.ogg
          time: 2
          requiredPart: FootRight

- type: surgeryTransition
  id: IpcAttachRightFootTransition
  target: IpcAttachRightFootProcess
  label: Прикрепить правую стопу
  stepGroups:
    - conditions:
        - !type:OrganPresentCondition
          organ: LegRight
        - !type:OrganPresentCondition
          invert: true
          organ: FootRight
      steps:
        - tool: [ Screwing ]
          tag: [ Knife, Shiv, BasicGlassShard]
          action: Unscrew
          sound:
            collection: Screwdriver
          time: 2

- type: surgeryTransition
  id: IpcAttachRightFootProcessTransition
  target: IpcEndOperation
  label: Прикрепить правую стопу
  stepGroups:
    - steps:
        - tag: [ CableCoil ]
          entityPreview: CableApcStack
          action: MendWire
          time: 2
        - tag: [ RightFootSynthetic ]
          action: InsertOrgan
          requiredPart: FootRight
          time: 2
        - tool: [ Anchoring ]
          tag: [ Wirecutter, Pipe ]
          action: Anchor
          sound:
            path: /Audio/Items/ratchet.ogg
          time: 2

# Завершающий переход конечности
- type: surgeryTransition
  id: IpcCompleteOperationTransition
  target: Default
  label: Завершить
  stepGroups:
    - steps:
        - tool: [ Welding, Cautery ]
          action: Weld
          sound:
            collection: Welder
          time: 2
        - tool: [ Pulsing ]
          tag: [ DoorElectronicsConfigurator ]
          action: Pulse
          sound:
            collection: CargoBeep
          time: 2
